kind = "web"
previewPath = "/"
title = "Alma Jalisco"
version = "1.0.0"
id = "artifacts/alma-jalisco"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23495

[services.development]
run = "pnpm --filter @workspace/alma-jalisco run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alma-jalisco", "run", "build" ]
publicDir = "artifacts/alma-jalisco/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23495"
BASE_PATH = "/"
